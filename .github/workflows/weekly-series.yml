name: Weekly Series (EN)

on:
  # Серия идёт 3 дня подряд и ЗАМЕЩАЕТ прайм-слот 00:07 UTC (20:07 ET) обычного daily.yml
  # в эти дни (daily.yml сам пропускает 00:07-слот в Пн/Вт/Ср — см. guard там).
  # Триггерится cron-job.org (workflow_dispatch) 3 дня подряд. Part определяется по ПРОГРЕССУ
  # серии (next_part в series_state), а не по дню недели: 1-й запуск цикла → Part 1 (генерит
  # все 3 скрипта), следующие → Part 2, Part 3. Устойчиво к времени/дню запуска cron.
  workflow_dispatch:
    inputs:
      part:
        description: "Force part 1/2/3. Пусто = авто (по прогрессу серии)."
        required: false
        default: ""

permissions:
  contents: write   # Part 1 коммитит series_state_en.json в репо

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
            src/vision_cache.json
          key: titles-cache-en-${{ github.run_id }}
          restore-keys: titles-cache-en

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick policy
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run series pipeline
        working-directory: src
        env:
          # Пусто = авто (часть по прогрессу серии из series_state). Ручной запуск может задать 1/2/3.
          SERIES_PART: ${{ github.event.inputs.part }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_series.py

      # Состояние меняется КАЖДЫЙ запуск (Part 1 пишет 3 скрипта, Part 2/3 двигают next_part),
      # поэтому коммитим всегда — Part 2/3 получают свежий state через checkout.
      - name: Persist series state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/series_state_en.json
          git commit -m "chore(series): EN state $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
