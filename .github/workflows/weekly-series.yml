name: Weekly Series (EN)

on:
  # Серия идёт 3 дня подряд и ЗАМЕЩАЕТ прайм-слот 00:07 UTC (20:07 ET) обычного daily.yml
  # в эти дни (daily.yml сам пропускает 00:07-слот в Пн/Вт/Ср — см. guard там).
  # Триггерится cron-job.org (workflow_dispatch) Пн/Вт/Ср 00:07 UTC — GitHub-cron убран
  # (опаздывал, а тут опоздание = пропуск прайм-слота). Part определяется по дню недели.
  #   Понедельник 00:07 UTC — Part 1 (генерирует все 3 скрипта)
  #   Вторник     00:07 UTC — Part 2
  #   Среда       00:07 UTC — Part 3
  workflow_dispatch:
    inputs:
      part:
        description: "Which part to publish (1/2/3). Пусто = авто по дню недели."
        required: false
        default: ""

permissions:
  contents: write   # Part 1 коммитит series_state_en.json в репо

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine series part
        id: part
        run: |
          PART="${{ github.event.inputs.part }}"
          if [ -z "$PART" ]; then
            DOW=$(date -u +%u)  # 1=Mon, 2=Tue, 3=Wed
            case $DOW in
              1) PART=1 ;;
              2) PART=2 ;;
              3) PART=3 ;;
              *) PART=1 ;;
            esac
          fi
          echo "part=$PART" >> $GITHUB_OUTPUT

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
          key: titles-cache-en
          restore-keys: titles-cache-en

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick policy
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run series pipeline
        working-directory: src
        env:
          SERIES_PART: ${{ steps.part.outputs.part }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_series.py

      # Part 1 сгенерировал все 3 скрипта — коммитим состояние, чтобы Part 2/3 (Вт/Ср)
      # получили его через checkout. Надёжнее actions/cache (тот вытеснялся за 7 дней).
      - name: Persist series state (Part 1)
        if: steps.part.outputs.part == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/series_state_en.json
          git commit -m "chore(series): EN state $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
