name: Weekly Retention Report

on:
  # Не тратит Claude (только YouTube Analytics API) — таймингу не критично, поэтому
  # штатный GitHub-cron ок (в отличие от daily/series/longform, где опоздание = пропуск
  # прайм-слота публикации). Раз в неделю, буднее утро.
  schedule:
    - cron: "13 8 * * 1"
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # коммитит hook_stats_<channel>.json (лучший хук-шаблон → в промпт)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: EN report
        working-directory: src
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weekly_report.py

      - name: ES report
        working-directory: src
        env:
          CHANNEL: es
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weekly_report.py

      # generate_script._hook_preference() читает эти файлы из репо при каждой генерации —
      # без коммита данные остались бы в эфемерном раннере (тот же паттерн, что queue_*.json).
      - name: Persist hook stats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in hook_stats_en.json hook_stats_es.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git commit -m "chore(hooks): weekly hook stats $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
