name: Daily Shorts Watchdog (PT)

on:
  # 15 минут после каждого слота в daily-pt.yml (17:23/21:23/23:23/01:23 UTC).
  # Зеркало watchdog-es.yml (2026-07-09). Слоты читаются из CFG["daily_slots_utc"]
  # (config.py) — тот же check_recent_upload.py через CHANNEL=pt.
  schedule:
    - cron: "38 17 * * *"
    - cron: "38 21 * * *"
    - cron: "38 23 * * *"
    - cron: "38 1 * * *"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: write   # ретрай пайплайна берёт сценарий из queue_pt.json — его надо закоммитить обратно

jobs:
  check-and-retry:
    runs-on: ubuntu-latest
    steps:
      # 2026-07-13: ждём завершения живого прогона вместо немедленного skip — см. watchdog.yml
      # (реальный промах 12.07: guard пришёл за 5 секунд до конца ПАДАЮЩЕГО прогона).
      - name: Wait for in-flight daily-pt run, then decide
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 16); do
            running=$(gh run list --workflow=daily-pt.yml --repo=${{ github.repository }} \
              --status=in_progress --limit=5 --json databaseId --jq 'length')
            [ "$running" -eq 0 ] && break
            echo "Daily-PT pipeline is in progress — waiting 30s ($i/16)..."
            sleep 30
          done
          if [ "$running" -gt 0 ]; then
            echo "Daily-PT still running after 8 min — real long render, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip == 'false'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Install Python deps
        if: steps.guard.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Check for recent upload
        if: steps.guard.outputs.skip == 'false'
        id: check
        working-directory: src
        env:
          CHANNEL: pt
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          # 2026-07-17: свой OAuth-клиент на канал (лимит Google — 50 живых токенов
          # на client_id+аккаунт; общий client_id вытеснял чужие токены).
          # Секрет не заведён => _client_pair() падает на общие выше.
          YT_CLIENT_ID_PT: ${{ secrets.YT_CLIENT_ID_PT }}
          YT_CLIENT_SECRET_PT: ${{ secrets.YT_CLIENT_SECRET_PT }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_PT }}
        run: |
          if python check_recent_upload.py; then
            echo "missed=false" >> "$GITHUB_OUTPUT"
          else
            echo "missed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system deps (only if retry needed)
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files (only if retry needed)
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Retry pipeline (scheduled run was missed)
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        working-directory: src
        env:
          CHANNEL: pt
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          # 2026-07-17: свой OAuth-клиент на канал (лимит Google — 50 живых токенов
          # на client_id+аккаунт; общий client_id вытеснял чужие токены).
          # Секрет не заведён => _client_pair() падает на общие выше.
          YT_CLIENT_ID_PT: ${{ secrets.YT_CLIENT_ID_PT }}
          YT_CLIENT_SECRET_PT: ${{ secrets.YT_CLIENT_SECRET_PT }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_PT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline.py

      - name: Persist queue state
        if: always() && steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f queue_pt.json ] && git add queue_pt.json
          [ -f paired_facts_pt.json ] && git add paired_facts_pt.json
          [ -f video_history_pt.json ] && git add video_history_pt.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore(queue): PT queue/card state (watchdog retry) $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
