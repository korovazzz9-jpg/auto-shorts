name: Weekly Longform Compilation (ES)

on:
  # Раз в неделю, воскресенье 23:17 UTC (17:17 Мехико, вечер) — ОТДЕЛЬНЫЙ слот, не забирает
  # шортс. Триггерится cron-job.org (workflow_dispatch).
  workflow_dispatch: {}

permissions:
  contents: write   # коммитит longform_state_es.json для ротации форматов

jobs:
  publish:
    # 2026-07-15: пауза СНЯТА по решению пользователя (стояла несколько часов). Замечание для
    # будущего: лонгформ слабо окупается на всех каналах — медиана 6 просмотров на EN против
    # 900-1000 у шортсов, ES 16; EN-лонгформ по этой причине заглушен (weekly-longform.yml).
    # ES оставлен намеренно: 16 просмотров — лучший результат среди лонгформов, плюс канал
    # под подавлением раздачи (см. README «Аномалия ES»), и лонгформ здесь работает как ещё
    # одна канарейка. Пауза: вернуть `if: false` перед `runs-on`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run longform pipeline (Spanish channel)
        working-directory: src
        env:
          CHANNEL: es
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          NOVITA_KEY: ${{ secrets.NOVITA_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_longform.py

      - name: Commit longform state (format rotation)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add longform_state_es.json
          git commit -m "chore: longform_state_es format rotation" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
