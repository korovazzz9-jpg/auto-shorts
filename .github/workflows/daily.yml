name: Daily Shorts

on:
  # Триггерится ТОЛЬКО внешним cron-job.org (через workflow_dispatch), по слотам US-пиков
  # (~13:00, 16:00, 20:00, 22:00, 00:00 UTC). Родной GitHub-cron УБРАН: он опаздывает на
  # десятки минут и не совпадал по времени с cron-job.org, из-за чего concurrency-группа не
  # ловила дубли и выходило ~10 видео/день вместо 5. cron-job.org бьёт точно вовремя;
  # подстраховка от пропусков — watchdog.yml.
  workflow_dispatch: {}

concurrency:
  group: daily-en
  cancel-in-progress: true

jobs:
  # В Пн/Вт/Ср ПРАЙМОВЫЙ слот 00:07 UTC (20:07 ET) занимает серия (weekly-series.yml) —
  # обычное видео в этот слот не публикуем, иначе будет 6 роликов в день вместо 5.
  # Guard срабатывает независимо от типа триггера (cron-job.org бьёт daily в 00:07).
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          DOW=$(date -u +%u)    # 1=Mon ... 7=Sun
          HOUR=$(date -u +%H)
          if [ "$DOW" -le 3 ] && [ "$HOUR" = "00" ]; then
            echo "Серия (Part $DOW) замещает прайм-слот 00:07 сегодня — обычное видео пропускаем."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: guard
    if: needs.guard.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: src/titles_cache.json
          key: titles-cache-en
          restore-keys: titles-cache-en

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline.py
