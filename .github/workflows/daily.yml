name: Daily Shorts

on:
  # Времена подобраны под пики активности US-аудитории (US Eastern, с учётом летнего
  # времени UTC-4): ~09:00, 12:00, 16:00, 18:00, 20:00 ET -> ~13:00, 16:00, 20:00, 22:00, 00:00 UTC.
  # Смещены на несколько минут от ровного часа: по рекомендации GitHub триггеры на ":00"
  # чаще задерживаются/пропускаются из-за пиковой нагрузки в начале каждого часа.
  schedule:
    - cron: "7 13 * * *"
    - cron: "13 16 * * *"
    - cron: "7 20 * * *"
    - cron: "13 22 * * *"
    - cron: "7 0 * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: src/titles_cache.json
          key: titles-cache-en
          restore-keys: titles-cache-en

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python pipeline.py
