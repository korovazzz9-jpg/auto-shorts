name: Daily Shorts

on:
  # Триггерится ТОЛЬКО внешним cron-job.org (через workflow_dispatch), по слотам US-пиков.
  # 2026-07-01: EN 5→4 слота (перелив ресурса на ES, отдача 2×, см. README). Слоты теперь
  # 16:13, 20:07, 23:07, 00:07 UTC — убран 13:07 (8am ET, худшее US-окно). 2026-07-05:
  # 22:13→23:07 (18:13→19:07 EDT — из "мёртвой зоны" в вечерний US-прайм 7-9pm, см. README).
  # В cron-job.org нужно удалить триггер 13:07, поменять 22:13 на 23:07. Родной GitHub-cron
  # УБРАН: он опаздывает на десятки минут и
  # не совпадал по времени с cron-job.org, из-за чего concurrency-группа не ловила дубли и
  # выходило ~10 видео/день. cron-job.org бьёт точно вовремя; подстраховка — watchdog.yml.
  workflow_dispatch: {}

concurrency:
  group: daily-en
  cancel-in-progress: true

jobs:
  # В Пн/Вт/Ср ПРАЙМОВЫЙ слот 00:07 UTC (20:07 ET) занимает серия (weekly-series.yml) —
  # обычное видео в этот слот не публикуем, иначе будет 5 роликов в день вместо 4.
  # Guard срабатывает независимо от типа триггера (cron-job.org бьёт daily в 00:07).
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          DOW=$(date -u +%u)    # 1=Mon ... 7=Sun
          HOUR=$(date -u +%H)
          if [ "$DOW" -le 3 ] && [ "$HOUR" = "00" ]; then
            echo "Серия (Part $DOW) замещает прайм-слот 00:07 сегодня — обычное видео пропускаем."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: guard
    if: needs.guard.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # коммитит queue_en.json обратно (Batch API preload, prepare_batch.py)
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
            src/vision_cache.json
          key: titles-cache-en-${{ github.run_id }}
          restore-keys: titles-cache-en

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline.py

      # pipeline.py может взять сценарий из queue_en.json (Batch API preload) и вычеркнуть
      # его локально — без коммита обратно каждый следующий запуск снова увидел бы старую
      # (несдвинутую) очередь из git. if: always() — коммитим даже при частичном сбое ниже
      # по пайплайну, чтобы использованный слот очереди не выдавался повторно.
      - name: Persist queue state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ig_card_counter_en.json меняется только в слот IG-карточки (ig_card_slot_hour) —
          # на остальных 3 слотах дня файла может не быть/не измениться, это ок.
          [ -f queue_en.json ] && git add queue_en.json
          [ -f ig_card_counter_en.json ] && git add ig_card_counter_en.json
          [ -f paired_facts_en.json ] && git add paired_facts_en.json
          [ -f video_history_en.json ] && git add video_history_en.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore(queue): EN queue/card state $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
