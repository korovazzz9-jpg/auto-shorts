name: Daily Shorts Watchdog

on:
  # 15 минут после каждого слота в daily.yml.
  # 2026-07-01: EN 5→4 слотов (перелив на ES) — убран watchdog для слота 13:07.
  # 2026-07-05: слот 22:13→23:07 (US-прайм) — watchdog сдвинут на 23:22 соответственно.
  schedule:
    - cron: "28 16 * * *"
    - cron: "22 20 * * *"
    - cron: "22 23 * * *"
    - cron: "22 0 * * *"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: write   # ретрай пайплайна берёт сценарий из queue_en.json — его надо закоммитить обратно

jobs:
  check-and-retry:
    runs-on: ubuntu-latest
    steps:
      # 2026-07-13: раньше «daily в процессе» = немедленный skip. Реальный промах 12.07:
      # watchdog пришёл в 20:08:43, а ПАДАЮЩИЙ прогон daily завершился в 20:08:48 — guard
      # увидел in_progress, пропустил всё, слот потерялся до ручного вмешательства. Теперь
      # ЖДЁМ завершения живого прогона (до ~8 мин) и лишь потом решаем по факту наличия
      # свежего видео: успешный прогон -> has_recent_upload увидит ролик и ретрая не будет;
      # упавший -> ретрай отработает. Skip остаётся только если daily висит дольше 8 минут
      # (значит он реально публикует длинный рендер — мешать нельзя).
      - name: Wait for in-flight daily run, then decide
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 16); do
            running=$(gh run list --workflow=daily.yml --repo=${{ github.repository }} \
              --status=in_progress --limit=5 --json databaseId --jq 'length')
            [ "$running" -eq 0 ] && break
            echo "Daily pipeline is in progress — waiting 30s ($i/16)..."
            sleep 30
          done
          if [ "$running" -gt 0 ]; then
            echo "Daily still running after 8 min — real long render, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip == 'false'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Install Python deps
        if: steps.guard.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Check for recent upload
        if: steps.guard.outputs.skip == 'false'
        id: check
        working-directory: src
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          if python check_recent_upload.py; then
            echo "missed=false" >> "$GITHUB_OUTPUT"
          else
            echo "missed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system deps (only if retry needed)
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files (only if retry needed)
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Retry pipeline (scheduled run was missed)
        if: steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python pipeline.py

      # Тот же шаг, что в daily.yml: pipeline.py мог взять сценарий из queue_en.json
      # (Batch API preload) — без коммита следующий запуск увидел бы несдвинутую очередь
      # и опубликовал бы ТОТ ЖЕ сценарий второй раз.
      - name: Persist queue state
        if: always() && steps.guard.outputs.skip == 'false' && steps.check.outputs.missed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f queue_en.json ] && git add queue_en.json
          [ -f ig_card_counter_en.json ] && git add ig_card_counter_en.json
          [ -f video_history_en.json ] && git add video_history_en.json
          [ -f paired_facts_en.json ] && git add paired_facts_en.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore(queue): EN queue/card state (watchdog retry) $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
