name: Prepare Batch Queue

on:
  # Не критично ко времени публикации (только пополняет очередь на будущее) — штатный
  # GitHub-cron ок, в отличие от daily/series/longform. Раз в сутки.
  # ⚠️ 2026-07-09: было 03:17 UTC — РОВНО тот же момент, что собственный ES daily-слот
  # (daily_slots_utc содержит (3,17))! daily-es.yml коммитил queue_es.json в ТУ ЖЕ минуту,
  # что prepare-batch туда писал — реальный race condition (пойман в проде: git rebase
  # конфликт, прогон упал). 09:17 UTC — в мёртвой зоне 03:47-16:13, где НЕТ ни одного
  # daily-слота ни у одного канала (EN/ES/PT).
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # коммитит queue_en.json / queue_es.json
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
          key: titles-cache-en-${{ github.run_id }}
          restore-keys: titles-cache-en

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      # YT-креды нужны дедупу против уже ОПУБЛИКОВАННЫХ видео (recent_titles.
      # get_recent_video_texts) — без них проверка молча превращается в no-op
      # (перегенерация того же факта, реальный случай: медуза 2026-07-04).
      - name: Prepare EN queue
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          # 2026-07-09: TELEGRAM нужен, чтобы guard_main в prepare_batch.py мог реально
          # отправить алерт при падении (без них notify молча no-op).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python prepare_batch.py

      - name: Prepare ES queue
        working-directory: src
        env:
          CHANNEL: es
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python prepare_batch.py

      - name: Prepare PT queue
        working-directory: src
        env:
          CHANNEL: pt
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_PT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python prepare_batch.py

      - name: Persist queue files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in queue_en.json queue_es.json queue_pt.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git commit -m "chore(queue): batch preload $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
