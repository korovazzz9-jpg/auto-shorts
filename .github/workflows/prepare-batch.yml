name: Prepare Batch Queue

on:
  # Не критично ко времени публикации (только пополняет очередь на будущее) — штатный
  # GitHub-cron ок, в отличие от daily/series/longform. Раз в сутки, ночью по UTC.
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # коммитит queue_en.json / queue_es.json
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
          key: titles-cache-en-${{ github.run_id }}
          restore-keys: titles-cache-en

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Prepare EN queue
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python prepare_batch.py

      - name: Prepare ES queue
        working-directory: src
        env:
          CHANNEL: es
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python prepare_batch.py

      - name: Persist queue files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in queue_en.json queue_es.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git commit -m "chore(queue): batch preload $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
