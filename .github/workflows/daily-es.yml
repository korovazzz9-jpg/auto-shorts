name: Daily Shorts (ES)

on:
  # Триггерится ТОЛЬКО внешним cron-job.org (workflow_dispatch), слоты 13:17, 20:17, 00:17 UTC.
  # Родной GitHub-cron убран — он опаздывал и плодил дубли с cron-job.org (см. daily.yml).
  # Подстраховка от пропусков — watchdog.yml.
  workflow_dispatch: {}

concurrency:
  group: daily-es
  cancel-in-progress: true

jobs:
  # В Пн/Вт/Ср прайм-слот 00:17 UTC (18:17 Мехико) занимает серия (weekly-series-es.yml) —
  # обычное видео в этот слот не публикуем, иначе будет 4 ролика в день вместо 3.
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          DOW=$(date -u +%u)    # 1=Mon ... 7=Sun
          HOUR=$(date -u +%H)
          if [ "$DOW" -le 3 ] && [ "$HOUR" = "00" ]; then
            echo "Серия (Part $DOW) замещает прайм-слот 00:17 сегодня — обычное видео пропускаем."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: guard
    if: needs.guard.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
          key: titles-cache-es
          restore-keys: titles-cache-es

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline (Spanish channel)
        working-directory: src
        env:
          CHANNEL: es
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # ES-канал использует отдельный YouTube-токен (Brand Account), но те же
          # client_id/secret приложения. Секрет YT_REFRESH_TOKEN_ES маппится в стандартное имя.
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline.py
