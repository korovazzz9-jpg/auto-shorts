name: Daily Shorts (ES)

on:
  # Триггерится ТОЛЬКО внешним cron-job.org (workflow_dispatch).
  # 2026-07-14: ES 3→2 слота (ответ на подавление раздачи, см. config.py/README). Актуальные
  # слоты: 00:17, 03:17 UTC. История: 07-01 3→4 (+16:17), 07-07 13:17→03:17 (вечерний прайм
  # Мехико), 07-13 убран 16:17 (4→3), 07-14 убран 20:17 (3→2). ⚠️ В cron-job.org отключить
  # триггеры ES-1617 и ES-2017.
  # Родной GitHub-cron убран — он опаздывал и плодил дубли с cron-job.org (см. daily.yml).
  # Watchdog ES (watchdog-es.yml) страхует слоты 00:17/03:17.
  workflow_dispatch: {}

concurrency:
  group: daily-es
  cancel-in-progress: true

jobs:
  # В Пн/Вт/Ср прайм-слот 00:17 UTC (18:17 Мехико) занимает серия (weekly-series-es.yml) —
  # обычное видео в этот слот не публикуем, иначе будет 5 роликов в день вместо 4.
  guard:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          DOW=$(date -u +%u)    # 1=Mon ... 7=Sun
          HOUR=$(date -u +%H)
          if [ "$DOW" -le 3 ] && [ "$HOUR" = "00" ]; then
            echo "Серия (Part $DOW) замещает прайм-слот 00:17 сегодня — обычное видео пропускаем."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: guard
    if: needs.guard.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # коммитит queue_es.json обратно (Batch API preload, prepare_batch.py)
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache_es.json
            src/topics_cache_es.json
            src/vision_cache.json
          key: titles-cache-es-${{ github.run_id }}
          restore-keys: titles-cache-es

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pipeline (Spanish channel)
        working-directory: src
        env:
          CHANNEL: es
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # ES-канал использует отдельный YouTube-токен (Brand Account), но те же
          # client_id/secret приложения. Секрет YT_REFRESH_TOKEN_ES маппится в стандартное имя.
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          # Instagram ES (2026-07-01): свой Business-аккаунт/токен, тот же паттерн, что YT выше —
          # секрет с суффиксом _ES маппится в стандартное имя, которое читает upload_instagram.py.
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN_ES }}
          IG_USER_ID: ${{ secrets.IG_USER_ID_ES }}
          # FB Reels (2026-07-10) — активируется, когда post_to_facebook=True в config + секреты заданы.
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID_ES }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN_ES }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline.py

      - name: Persist queue state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ig_card_counter_es.json меняется только в слот IG-карточки (ig_card_slot_hour) —
          # на остальных 3 слотах дня файла может не быть/не измениться, это ок.
          [ -f queue_es.json ] && git add queue_es.json
          [ -f ig_card_counter_es.json ] && git add ig_card_counter_es.json
          [ -f paired_facts_es.json ] && git add paired_facts_es.json
          [ -f video_history_es.json ] && git add video_history_es.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore(queue): ES queue/card state $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
