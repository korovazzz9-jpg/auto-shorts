name: Comment Agent

on:
  # Раз в 4 часа — компромисс между задержкой апрува (см. comment_agent.py, docstring) и
  # GitHub Actions-минутами (репо приватный, лимит 2000 мин/мес, см. README). Лёгкий job
  # (без moviepy/imagemagick) — только API-вызовы, не рендер видео.
  schedule:
    - cron: "11 */4 * * *"
  workflow_dispatch: {}

concurrency:
  group: comment-agent
  cancel-in-progress: false  # не обрывать на середине — можем потерять апрув/недокоммитить offset

permissions:
  contents: write  # коммитит comment_agent_state.json обратно

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Сознательно НЕ requirements.txt целиком — тут не нужны moviepy/pillow/edge-tts/
      # cloudinary, и нет apt-get imagemagick. Держим job лёгким (GH Actions-минуты — узкое
      # место при 6 прогонах/день, см. comment_agent.py docstring).
      - name: Install Python deps (lean, no video-rendering libs)
        run: pip install anthropic google-auth google-auth-oauthlib google-api-python-client python-dotenv requests

      - name: Run comment agent (both channels, one process)
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_REFRESH_TOKEN_ES: ${{ secrets.YT_REFRESH_TOKEN_ES }}
        run: python comment_agent.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f comment_agent_state.json ] && git add comment_agent_state.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore(comments): agent state $(date -u +%F' '%H:%M)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
