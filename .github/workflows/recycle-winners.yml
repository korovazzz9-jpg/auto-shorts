name: Recycle Cross-Channel Winners

on:
  # Раз в неделю: топ-факты одного канала пересоздаются для другого (Batch API, −50%).
  # Не критично ко времени публикации (только пополняет очереди) — штатный GitHub-cron ок.
  # Чт 09:47 UTC — после ночного prepare-batch (09:17), чтобы очередь уже была подтянута.
  # ⚠️ 2026-07-09: было 03:47 (после старого prepare-batch 03:17) — тот кластер совпадал
  # с ES daily-слотом 03:17 и watchdog-es 03:32, реальный race condition на queue_es.json
  # (пойман в проде). Перенесено в мёртвую зону 03:47-16:13 вместе с prepare-batch.
  schedule:
    - cron: "47 9 * * 4"
  workflow_dispatch: {}

# 2026-07-09: см. concurrency в prepare-batch.yml — та же группа, GitHub-cron может
# опоздать на часы (пойман: этот воркфлоу реально стартовал в 12:43 вместо 09:47),
# поэтому "расписание в мёртвой зоне" НЕ гарантирует отсутствие пересечения — только
# группа гарантирует строгую очерёдность.
concurrency:
  group: queue-maintenance
  cancel-in-progress: false

jobs:
  recycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # коммитит queue_en.json / queue_es.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Цель = ES, источник = EN: победители EN пересоздаются на испанском.
      # ⏸ ПРИОСТАНОВЛЕНО 2026-07-13 (if: false): ES под подавлением раздачи (inauthentic-
      # classifier, см. память проекта). Пересозданные дубли EN-фактов — прямой паттерн из
      # политики («видео, идентичные во всём кроме заголовка»); по таймингу подавление
      # началось сразу после публикации последней recycled-партии. Вернуть шаг после
      # восстановления раздачи ES (убрать if: false).
      - name: Recycle EN winners into ES queue
        if: false
        working-directory: src
        env:
          CHANNEL: es
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          # 2026-07-17: свой OAuth-клиент на канал (лимит Google — 50 живых токенов
          # на client_id+аккаунт; общий client_id вытеснял чужие токены).
          # Секрет не заведён => _client_pair() падает на общие выше.
          YT_CLIENT_ID_ES: ${{ secrets.YT_CLIENT_ID_ES }}
          YT_CLIENT_SECRET_ES: ${{ secrets.YT_CLIENT_SECRET_ES }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          SOURCE_YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          # 2026-07-17: токен источника валиден только с client_id источника (свой OAuth-клиент
          # на канал) — _source_client() берёт пару по SOURCE_CHANNEL.
          SOURCE_CHANNEL: en
          YT_CLIENT_ID_EN: ${{ secrets.YT_CLIENT_ID_EN }}
          YT_CLIENT_SECRET_EN: ${{ secrets.YT_CLIENT_SECRET_EN }}
        run: python recycle_winners.py

      # Цель = EN, источник = ES: и в обратную сторону.
      - name: Recycle ES winners into EN queue
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          # 2026-07-17: свой OAuth-клиент на канал (лимит Google — 50 живых токенов
          # на client_id+аккаунт; общий client_id вытеснял чужие токены).
          # Секрет не заведён => _client_pair() падает на общие выше.
          YT_CLIENT_ID_EN: ${{ secrets.YT_CLIENT_ID_EN }}
          YT_CLIENT_SECRET_EN: ${{ secrets.YT_CLIENT_SECRET_EN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SOURCE_YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          SOURCE_CHANNEL: es
          YT_CLIENT_ID_ES: ${{ secrets.YT_CLIENT_ID_ES }}
          YT_CLIENT_SECRET_ES: ${{ secrets.YT_CLIENT_SECRET_ES }}
        run: python recycle_winners.py

      - name: Persist queue files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in queue_en.json queue_es.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          git commit -m "chore(queue): recycled cross-channel winners $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
