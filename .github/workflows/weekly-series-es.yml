name: Weekly Series (ES)

on:
  # Серия ES идёт 3 дня подряд и ЗАМЕЩАЕТ прайм-слот 00:17 UTC (18:17 Мехико) обычного
  # daily-es.yml в эти дни (daily-es.yml сам пропускает 00:17-слот в Пн/Вт/Ср — см. guard там).
  # Триггерится cron-job.org (workflow_dispatch) Пн/Вт/Ср 00:17 UTC. Part — по дню недели.
  workflow_dispatch:
    inputs:
      part:
        description: "Which part to publish (1/2/3). Пусто = авто по дню недели."
        required: false
        default: ""

permissions:
  contents: write   # Part 1 коммитит series_state_es.json в репо

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
            src/vision_cache.json
          key: titles-cache-es-${{ github.run_id }}
          restore-keys: titles-cache-es

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick policy
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run series pipeline (Spanish channel)
        working-directory: src
        env:
          CHANNEL: es
          # Пусто = авто (часть по прогрессу серии из series_state). Ручной запуск может задать 1/2/3.
          SERIES_PART: ${{ github.event.inputs.part }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # ES-канал: те же client_id/secret приложения, отдельный refresh-токен.
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_series.py

      - name: Persist series state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/series_state_es.json
          git commit -m "chore(series): ES state $(date -u +%F)" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
