name: Weekly Series (ES)

on:
  # Серия ES идёт 3 дня подряд и ЗАМЕЩАЕТ прайм-слот 00:17 UTC (18:17 Мехико) обычного
  # daily-es.yml в эти дни (daily-es.yml сам пропускает 00:17-слот в Пн/Вт/Ср — см. guard там).
  # Триггерится cron-job.org (workflow_dispatch) Пн/Вт/Ср 00:17 UTC. Part — по дню недели.
  workflow_dispatch:
    inputs:
      part:
        description: "Which part to publish (1/2/3). Пусто = авто по дню недели."
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine series part
        id: part
        run: |
          PART="${{ github.event.inputs.part }}"
          if [ -z "$PART" ]; then
            DOW=$(date -u +%u)  # 1=Mon, 2=Tue, 3=Wed
            case $DOW in
              1) PART=1 ;;
              2) PART=2 ;;
              3) PART=3 ;;
              *) PART=1 ;;
            esac
          fi
          echo "part=$PART" >> $GITHUB_OUTPUT

      - name: Restore series state
        uses: actions/cache@v4
        with:
          path: src/series_state.json
          key: series-state-es
          restore-keys: series-state-es

      - name: Restore titles cache
        uses: actions/cache@v4
        with:
          path: |
            src/titles_cache.json
            src/topics_cache.json
          key: titles-cache-es
          restore-keys: titles-cache-es

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick policy
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run series pipeline (Spanish channel)
        working-directory: src
        env:
          CHANNEL: es
          SERIES_PART: ${{ steps.part.outputs.part }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # ES-канал: те же client_id/secret приложения, отдельный refresh-токен.
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN_ES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_series.py
