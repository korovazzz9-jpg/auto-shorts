name: Weekly Longform Compilation

on:
  # Раз в неделю, воскресенье 23:00 UTC (19:00 ET, вечерний прайм) — ОТДЕЛЬНЫЙ слот, не
  # забирает шортс (23:00 не совпадает со слотами daily). Триггерится cron-job.org
  # (workflow_dispatch); GitHub-cron убран — опаздывал и мог разъехаться с прайм-временем.
  workflow_dispatch: {}

permissions:
  contents: write   # коммитит longform_state_<channel>.json для ротации форматов

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run longform pipeline
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_longform.py

      - name: Commit longform state (format rotation)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add longform_state_en.json
          git diff --cached --quiet || git commit -m "chore: longform_state_en format rotation"
          git push
