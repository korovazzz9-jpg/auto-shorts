name: Weekly Longform Compilation

on:
  # Раз в неделю, воскресенье 23:00 UTC (19:00 ET, вечерний прайм) — ОТДЕЛЬНЫЙ слот, не
  # забирает шортс (23:00 не совпадает со слотами daily). Триггерится cron-job.org
  # (workflow_dispatch); GitHub-cron убран — опаздывал и мог разъехаться с прайм-временем.
  workflow_dispatch: {}

permissions:
  contents: write   # коммитит longform_state_<channel>.json для ротации форматов

jobs:
  publish:
    # 2026-07-15: ПАУЗА по решению пользователя. Замер отдачи на ЗДОРОВОМ канале (EN Shorts
    # берут 900-1000): лонгформы 27.06=12, 28.06=6, 06.07=3, 12.07=6 просмотров, медиана 6 —
    # разрыв с шортсами ~150×. Причина структурная: канал Shorts-нативный, у длинного видео
    # нет browse/suggested-раздачи. При этом лонгформ — самый дорогой артефакт (платный
    # novita TTS + ~5-мин рендер = Actions-минуты при тесном лимите). На часы просмотра для
    # YPP не влияет (4 ролика ≈ 2 часа при цели 4000; узкое место — подписчики, 85/1000).
    # Откат: убрать эту строку `if: false`.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Allow ImageMagick to read caption text files
        run: sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run longform pipeline
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          NOVITA_KEY: ${{ secrets.NOVITA_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          # 2026-07-17: свой OAuth-клиент на канал (лимит Google — 50 живых токенов
          # на client_id+аккаунт; общий client_id вытеснял чужие токены).
          # Секрет не заведён => _client_pair() падает на общие выше.
          YT_CLIENT_ID_EN: ${{ secrets.YT_CLIENT_ID_EN }}
          YT_CLIENT_SECRET_EN: ${{ secrets.YT_CLIENT_SECRET_EN }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pipeline_longform.py

      - name: Commit longform state (format rotation)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add longform_state_en.json
          git commit -m "chore: longform_state_en format rotation" || { echo "no changes"; exit 0; }
          git pull --rebase origin master
          git push
